        ];
        let remainingQuotes = [...quotes];
        let usedQuotes = [];
        let currentQuote = {};

        function getRandomQuote() {
            if (remainingQuotes.length === 0) {
                remainingQuotes = [...usedQuotes];
                usedQuotes = [];
            }
            const randomIndex = Math.floor(Math.random() * remainingQuotes.length);
            currentQuote = remainingQuotes.splice(randomIndex, 1)[0];
            usedQuotes.push(currentQuote);
            updateQuoteDisplay();
        }

        function updateQuoteDisplay() {
            if (`${currentQuote.text}` != "undefined"){
                document.getElementById("quote").innerText = `"${currentQuote.text}"`;
                document.getElementById("quote2").style.display = "none";
                document.getElementById("author").innerText = `- ${currentQuote.author}`;
                document.getElementById("author").style.display = "none";
                document.getElementById("author2").style.display = "none";
                document.getElementById("reveal-btn").style.display = "inline-block";
                document.getElementById("reveal-btn2").style.display = 'none';
            } else if (`${currentQuote.text1}` != "undefined"){
                document.getElementById("quote2").style.display = "inline-block"
                document.getElementById("quote").innerText = `"${currentQuote.text1}"`;
                document.getElementById("quote2").innerText = `"${currentQuote.text2}"`;
                document.getElementById("author").innerText = `- ${currentQuote.author}`;
                document.getElementById("author2").innerText = `- ${currentQuote.author2}`;
                document.getElementById("author").style.display = "none";
                document.getElementById("author2").style.display = "none";
                document.getElementById("reveal-btn").style.display = "inline-block";
                document.getElementById("reveal-btn2").style.display = "inline-block";
            }
        }

        function revealAuthor() {
            document.getElementById("author").style.display = "flex";
            document.getElementById("author").style.alignItems = "center";
            document.getElementById("reveal-btn").style.display = "none";
            if ("undefined" != `${currentQuote.context}`){
                document.getElementById("programmers-comment").innerText = `programmer's comment: "${currentQuote.context}"`;
            }
        }
        function revealAuthor2(){
            document.getElementById("author2").style.display = "block";
            document.getElementById("reveal-btn2").style.display = "none";
        }

        function prevQuote() {
            if (usedQuotes.length > 1) {
                remainingQuotes.unshift(usedQuotes.pop());
                currentQuote = usedQuotes[usedQuotes.length - 1];
                updateQuoteDisplay();
            }
        }

        function nextQuote() {
            getRandomQuote();
            document.getElementById("author2").style.display = "none";
            document.getElementById("programmers-comment").innerText = "";
        }

        getRandomQuote();
    </script>
